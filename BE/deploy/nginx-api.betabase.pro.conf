# Full nginx example for api.betabase.pro (Hostinger VPS / Ubuntu)
#
# Install:
#   sudo cp nginx-api.betabase.pro.conf /etc/nginx/sites-available/api.betabase.pro
#   sudo ln -sf /etc/nginx/sites-available/api.betabase.pro /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Or run: sudo bash BE/deploy/fix-nginx-uploads.sh

server {
    listen 80;
    listen [::]:80;
    server_name api.betabase.pro;

    # REQUIRED for KYC, tickets, CRM uploads (default nginx limit is 1m)
    client_max_body_size 55m;
    client_body_timeout 120s;
    client_body_buffer_size 128k;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_request_buffering off;
    }
}

# After certbot SSL, certbot will add a second server { listen 443 ssl; ... } block.
# IMPORTANT: add these lines inside the HTTPS server block too:
#   client_max_body_size 55m;
#   client_body_timeout 120s;
